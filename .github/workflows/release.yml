name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  gate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      actions: read
      contents: read
    steps:
      - name: Check out exact release commit and tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Validate tag and recorded dry-run evidence
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
          EXPECTED_SHA: ${{ github.sha }}
          EVENT_AFTER: ${{ github.event.after }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          tag_ref="refs/tags/$TAG_NAME"
          read -r tag_object_sha peeled_commit_sha < <(bash .github/scripts/release-tag-identity.sh "$tag_ref" "$EVENT_AFTER" "$EXPECTED_SHA")
          version="$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
          test "$TAG_NAME" = "v$version"
          tag_body="$(git cat-file tag "$tag_ref")"
          test "$(grep -c '^dry-run-run-id: [0-9][0-9]*$' <<<"$tag_body")" = 1
          dry_run_id="$(sed -n 's/^dry-run-run-id: \([0-9][0-9]*\)$/\1/p' <<<"$tag_body")"
          encoded_tag="$(jq -rn --arg value "$TAG_NAME" '$value | @uri')"
          ref_json="$(gh api -H 'Accept: application/vnd.github+json' -H 'X-GitHub-Api-Version: 2022-11-28' "/repos/${REPOSITORY}/git/ref/tags/${encoded_tag}")"
          jq -e --arg ref "$tag_ref" --arg tag_sha "$tag_object_sha" '.ref == $ref and .object.type == "tag" and .object.sha == $tag_sha' <<<"$ref_json" >/dev/null
          tag_json="$(gh api -H 'Accept: application/vnd.github+json' -H 'X-GitHub-Api-Version: 2022-11-28' "/repos/${REPOSITORY}/git/tags/${tag_object_sha}")"
          jq -e --arg tag "$TAG_NAME" --arg tag_sha "$tag_object_sha" --arg sha "$peeled_commit_sha" '.tag == $tag and .sha == $tag_sha and .object.type == "commit" and .object.sha == $sha' <<<"$tag_json" >/dev/null
          run_json="$(gh api -H 'Accept: application/vnd.github+json' -H 'X-GitHub-Api-Version: 2022-11-28' "/repos/${REPOSITORY}/actions/runs/${dry_run_id}")"
          jq -e --arg repo "$REPOSITORY" --arg sha "$peeled_commit_sha" '.name == "Release dry run" and .path == ".github/workflows/release-dry-run.yml" and .event == "push" and .head_branch == "main" and .head_repository.full_name == $repo and .head_sha == $sha and .status == "completed" and .conclusion == "success"' <<<"$run_json" >/dev/null
          completed_at="$(jq -er '.updated_at' <<<"$run_json")"
          tagged_at="$(jq -er '.tagger.date' <<<"$tag_json")"
          test "$(date -d "$completed_at" +%s)" -le "$(date -d "$tagged_at" +%s)"

  build:
    needs: gate
    permissions:
      contents: read
    uses: ./.github/workflows/release-build.yml

  publish:
    needs: [gate, build]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: pypi
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Check out verifier at exact release commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}
          persist-credentials: false

      - name: Download exact build artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-${{ github.run_id }}-${{ github.sha }}
          path: release

      - name: Reverify downloaded artifacts
        run: |
          set -euo pipefail
          (cd release && sha256sum --check SHA256SUMS)
          mkdir dist
          cp release/meshflow_contracts-0.2.3-py3-none-any.whl dist/
          cp release/meshflow_contracts-0.2.3.tar.gz dist/
          python release_artifacts.py dist

      - name: Publish once with PyPI Trusted Publishing
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          packages-dir: dist
          attestations: true
          verify-metadata: true
          skip-existing: false
