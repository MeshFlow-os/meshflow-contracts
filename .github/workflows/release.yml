name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Check out exact release commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Set up uv and Python
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.28"
          python-version: "3.14.3"
          enable-cache: true
          cache-dependency-glob: |
            build-constraints.txt
            pyproject.toml
            uv.lock

      - name: Validate annotated local tag
        run: |
          set -euo pipefail
          tag_ref="refs/tags/${GITHUB_REF_NAME}"
          test "$(git cat-file -t "$tag_ref")" = tag
          test "$(git rev-parse HEAD)" = "$GITHUB_SHA"
          test "$(git rev-parse "${tag_ref}^{commit}")" = "$GITHUB_SHA"

      - name: Sync locked dependencies
        run: |
          set -euo pipefail
          uv sync --locked --all-groups

      - name: Validate package version sources
        run: |
          set -euo pipefail
          uv run --frozen python - <<'PY'
          import os
          import tomllib
          from pathlib import Path

          from meshflow_contracts import __version__

          project = tomllib.loads(Path("pyproject.toml").read_text())
          lock = tomllib.loads(Path("uv.lock").read_text())
          project_version = project["project"]["version"]
          locked_versions = [
              package["version"]
              for package in lock["package"]
              if package["name"] == project["project"]["name"]
          ]
          assert locked_versions == [project_version]
          assert __version__ == project_version
          assert os.environ["GITHUB_REF_NAME"] == f"v{project_version}"
          PY

      - name: Run quality checks
        run: |
          set -euo pipefail
          uv run --frozen pytest
          uv run --frozen ruff check .
          uv run --frozen mypy meshflow_contracts tests

      - name: Build release artifacts once
        run: |
          set -euo pipefail
          uv build --clear --no-create-gitignore --build-constraints build-constraints.txt --require-hashes

      - name: Verify and smoke-test release artifacts
        run: |
          set -euo pipefail
          uv run --frozen python release_artifacts.py dist
          uv venv --clear --python 3.14.3 .smoke-wheel
          uv pip install --python .smoke-wheel/bin/python dist/meshflow_contracts-0.2.1-py3-none-any.whl
          .smoke-wheel/bin/python -c 'import meshflow_contracts; assert meshflow_contracts.__version__ == "0.2.1"'
          uv venv --clear --python 3.14.3 .smoke-sdist
          uv pip install --python .smoke-sdist/bin/python --build-constraints build-constraints.txt dist/meshflow_contracts-0.2.1.tar.gz
          .smoke-sdist/bin/python -c 'import meshflow_contracts; assert meshflow_contracts.__version__ == "0.2.1"'
          mkdir release
          cp dist/meshflow_contracts-0.2.1-py3-none-any.whl release/
          cp dist/meshflow_contracts-0.2.1.tar.gz release/
          (cd release && sha256sum meshflow_contracts-0.2.1-py3-none-any.whl meshflow_contracts-0.2.1.tar.gz > SHA256SUMS)

      - name: Upload verified release artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-${{ github.run_id }}
          path: |
            release/meshflow_contracts-0.2.1-py3-none-any.whl
            release/meshflow_contracts-0.2.1.tar.gz
            release/SHA256SUMS
          if-no-files-found: error
          retention-days: 2

  publish:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: pypi
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Check out verifier at exact release commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}
          persist-credentials: false

      - name: Download exact build artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-${{ github.run_id }}
          path: release
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ github.run_id }}

      - name: Reverify downloaded artifacts
        run: |
          set -euo pipefail
          (cd release && sha256sum --check SHA256SUMS)
          mkdir dist
          cp release/meshflow_contracts-0.2.1-py3-none-any.whl dist/
          cp release/meshflow_contracts-0.2.1.tar.gz dist/
          python release_artifacts.py dist

      - name: Revalidate remote annotated tag
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
          EXPECTED_SHA: ${{ github.sha }}
          EVENT_AFTER: ${{ github.event.after }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          test "$EXPECTED_SHA" = "$EVENT_AFTER"
          encoded_tag="$(jq -rn --arg value "$TAG_NAME" '$value | @uri')"
          ref_json="$(gh api --fail-with-body -H 'Accept: application/vnd.github+json' -H 'X-GitHub-Api-Version: 2022-11-28' "/repos/${REPOSITORY}/git/ref/tags/${encoded_tag}")"
          jq -e --arg ref "refs/tags/${TAG_NAME}" '.ref == $ref and .object.type == "tag" and (.object.sha | type == "string")' <<<"$ref_json" >/dev/null
          tag_sha="$(jq -er '.object.sha' <<<"$ref_json")"
          tag_json="$(gh api --fail-with-body -H 'Accept: application/vnd.github+json' -H 'X-GitHub-Api-Version: 2022-11-28' "/repos/${REPOSITORY}/git/tags/${tag_sha}")"
          jq -e --arg tag "$TAG_NAME" --arg sha "$tag_sha" '.tag == $tag and .sha == $sha and .object.type == "commit" and (.object.sha | type == "string")' <<<"$tag_json" >/dev/null
          peeled_sha="$(jq -er '.object.sha' <<<"$tag_json")"
          test "$peeled_sha" = "$EXPECTED_SHA"
          test "$peeled_sha" = "$EVENT_AFTER"

      - name: Publish once with PyPI Trusted Publishing
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          packages-dir: dist
          attestations: true
          verify-metadata: true
          skip-existing: false
